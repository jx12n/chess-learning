name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  gates:
    name: Rust core → WASM → TS gates → Day 1 e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/truth-core

      # P1/P2 gates: perft vs reference, Gobble/Race playable in tests.
      - name: Truth core tests
        run: cargo test --manifest-path crates/truth-core/Cargo.toml

      - name: Truth core lints
        run: cargo clippy --manifest-path crates/truth-core/Cargo.toml --all-targets -- -D warnings

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install wasm-pack
        run: npm install -g wasm-pack

      # P0 gate: one Rust artifact, consumed by browser and Node alike.
      - name: Build WASM core
        run: pnpm build:wasm

      - name: Typecheck
        run: pnpm typecheck

      # P4/P5 gates: routing, learner model, verifier accept/refuse, and
      # `verify:curriculum` — every Day 1 exercise proven solvable.
      - name: Workspace tests (Node side of the same WASM artifact)
        run: pnpm test

      - name: Build play surface
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --filter @chess/web exec playwright install --with-deps chromium

      # P3/P6 gate: a learner completes Day 1 in a real browser; illegal
      # moves have no effect; failed budgets are recorded and routed.
      - name: Day 1 end-to-end
        run: pnpm --filter @chess/web e2e
